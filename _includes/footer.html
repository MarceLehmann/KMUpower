<footer class="site-footer">
  <div class="wrapper">
    <fluent-text>
      &copy; {{ 'now' | date: "%Y" }} {{ site.name | default: site.title }}. All rights reserved.
    </fluent-text>
    <nav class="footer-nav" style="margin-top: 10px;">
      {% if site.footer.links %}
        {% for link in site.footer.links %}
          <fluent-anchor href="{{ link.url | relative_url }}" appearance="neutral">{{ link.label }}</fluent-anchor>
        {% endfor %}
      {% else %}
        <!-- Placeholder for footer links if site.footer.links is not defined -->
        <!-- <fluent-anchor href="{{ '/impressum/' | relative_url }}" appearance="neutral">Impressum</fluent-anchor> -->
        <!-- <fluent-anchor href="{{ '/datenschutz/' | relative_url }}" appearance="neutral">Datenschutz</fluent-anchor> -->
      {% endif %}
    </nav>
  </div>
</footer>
