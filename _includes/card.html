<article class="archive__item" aria-labelledby="card-title-{{ include.title | slugify }}">
  <div class="archive__item-body">
    {% if include.icon %}
      <figure class="archive__item-teaser" style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);">
        <span style="font-size: 2.5em; color: var(--primary-color, #38c9c3);">
          {% case include.icon %}
            {% when "zap" %}⚡
            {% when "users" %}👥
            {% else %}🔹
          {% endcase %}
        </span>
      </figure>
    {% endif %}
    <h3 class="archive__item-title" id="card-title-{{ include.title | slugify }}">{{ include.title }}</h3>
    <div class="archive__item-excerpt">
      <p>{{ include.text }}</p>
    </div>
  </div>
</article>
