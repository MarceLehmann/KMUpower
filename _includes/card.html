<div class="archive__item">
  <div class="archive__item-body">
    {% if include.icon %}
      <div class="archive__item-teaser" style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);">        <span style="font-size: 2.5em; color: var(--primary-color, #38c9c3);">
          {% case include.icon %}
            {% when "zap" %}⚡
            {% when "users" %}👥
            {% else %}🔹
          {% endcase %}
        </span>
      </div>
    {% endif %}
    <h3 class="archive__item-title">{{ include.title }}</h3>
    <div class="archive__item-excerpt">
      <p>{{ include.text }}</p>
    </div>
  </div>
</div>
