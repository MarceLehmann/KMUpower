title: KMUpower
email: info@kmupower.ch
description: "Wir ermächtigen KMUs durch digitale Exzellenz."
url: "https://marcelehmann.github.io"
baseurl: "/KMUpower"

plugins:
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme

remote_theme: "mmistakes/minimal-mistakes"

lang: de
author:
  name: Marcel Lehmann
  avatar: "/assets/images/avatar.jpg"
  bio: "Gründer & CEO | Microsoft MVP | Digitalisierungsexperte für KMU im DACH-Raum"

# Navigation
navigation:
  main:
    - title: "Home"
      url: /
    - title: "Über uns"  
      url: /about/
    - title: "Services"
      url: /services/
    - title: "Kontakt"
      url: /contact/

# Collections (to prevent post issues)
collections:
  posts:
    output: false

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: false
      show_date: false
      seo:
        type: website