# Grundeinstellungen für eine Jekyll-Webseite mit Minimal Mistakes Theme

# Seitentitel und Beschreibung
title: KMUpower
subtitle: Lösungen für kleine und mittlere Unternehmen
name: KMUpower GmbH
description: Professionelle Dienstleistungen und Beratung für KMUs in der Schweiz
email: info@kmupower.example.com
url: "https://yourusername.github.io" # Die URL deiner Seite
baseurl: "/KMUpower" # der Unterpfad deiner Seite, z.B. "/blog"
locale: "de-CH" # Spracheinstellung

# Theme-Einstellungen
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
# theme: minimal-mistakes-jekyll  # Muss auskommentiert oder entfernt sein!

# Minimal Mistakes Skin
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Suchfunktion
search: true

# Site Author
author:
  name     : "Ihr Name"
  avatar   : "/assets/images/bio-photo.jpg"
  bio      : "Kurze Biographie über Sie oder Ihre Organisation."
  location : "Standort"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:your-email@example.com"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://your-website.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourprofile"

# Seiten-Navigation
include:
  - _pages

# Ausschlüsse vom Site-Build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE
  - README.md

# Permalinks für Posts und Seiten
permalink: /:categories/:title/

# Standardeinstellungen für Layouts
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Footer-Links
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/company/kmupower"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/kmupower"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
      url: "https://facebook.com/kmupower"
    - label: "Impressum"
      icon: "fas fa-fw fa-info-circle"
      url: "/impressum/"
    - label: "Datenschutz"
      icon: "fas fa-fw fa-lock"
      url: "/datenschutz/"
