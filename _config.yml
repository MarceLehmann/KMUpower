title: KMUpower
email: info@kmupower.ch
description: "Wir ermächtigen KMUs durch digitale Exzellenz."
url: "https://marcelehmann.github.io"
baseurl: "/KMUpower"
logo: "/assets/images/logo.png"
masthead_title: " "  # Leeren, um nur Logo zu zeigen

# IMPORTANT: Ensure that these plugins are installed for the theme to work properly
plugins:
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme

# Theme configuration
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Specify the main stylesheet explicitly
sass:
  sass_dir: assets/css
  style: compressed

lang: de
author:
  name: Marcel Lehmann
  avatar: "/assets/images/avatar.jpg"
  bio: "Gründer & CEO | Microsoft MVP | Digitalisierungsexperte für KMU im DACH-Raum"

# Default settings
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      classes: wide

# Site footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://youtube.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"

# Collections (for easier content management)
collections:
  services:
    output: true
    permalink: /:collection/:path/
  posts:
    output: false

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: false
      show_date: false
      seo:
        type: website